<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recipe Home Feed</title>
    <link rel="stylesheet" href="recipe-home-feed.css" />
  </head>
  <body>
    <section class="phone">
      <header class="topbar">
        <span class="status-dot" aria-hidden="true"></span>
        <a class="profile-icon" href="profile-grid-posts.html" aria-label="Open profile grid"></a>
      </header>

      <main class="feed">
        <article class="card">
          <header class="card-head">
            <span class="avatar" aria-hidden="true"></span>
            <strong>username</strong>
            <button type="button" class="follow">Follow</button>
          </header>

          <div class="image-wrap">
            <div class="recipe-photo"></div>
          </div>

          <div class="metrics" aria-label="Post actions and counts">
            <span>♡ 1.5K</span>
            <span>✈ 1.5K</span>
            <span>🔖 1.5K</span>
            <span>▯</span>
          </div>

          <p>Description of the post / recipie</p>
        </article>

        <article class="card">
          <header class="card-head">
            <span class="avatar" aria-hidden="true"></span>
            <strong>username</strong>
            <button type="button" class="follow">Follow</button>
          </header>

          <div class="image-wrap">
            <div class="recipe-photo"></div>
          </div>

          <div class="metrics" aria-label="Post actions and counts">
            <span>♡ 1.5K</span>
            <span>✈ 1.5K</span>
            <span>🔖 1.5K</span>
            <span>▯</span>
          </div>

          <p>Description of the post / recipie</p>
        </article>
      
      </main>
    </section>
  </body>
</html>
